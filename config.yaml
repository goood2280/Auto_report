# ============================================================
# 공통 관리 설정 (config.yaml) — 사내 내부 설정파일
# ============================================================
# DC Step 매핑(step_id → DC layer)을 vehicle별로 관리합니다.
# My_config.py가 이 파일에서 dc_step_to_ids를 로드하여
# step_id → DC step 역매핑(dc_dict)을 자동 생성합니다.
#
# NOTE: 이 파일은 사내 공통 관리 항목으로 별도 관리되며,
#       setup.py 자가추출 번들에는 포함되지 않습니다.
# ============================================================

vehicle_A:
  dc_step_to_ids:
    MFDC: ['test']

Vehicle_B:
  dc_step_to_ids:
    MFDC: ['test']
