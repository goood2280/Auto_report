# YOUR_PROJECT : PROJECT_NAME_A #Mail_API Project명 변경불필요  
# fab_QueryTimeSpan : 300 #fabquery 기간  
# inline_QueryTimeSpan : 300 #Inlinequery 기간  
# report_making : True report 생성 유무 True 생성  
# ptype_lot_turnoff : False lot type MP 물량 report 미생성위한값  
# specific_dc_layer : False 특정 DC layer만 등록 ex MFDC  
# ref_turnoff : True ref lot 정보 추가 유무

